<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio: Firebase Chat Project</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="auth-box">
            <div style="background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px border #ddd; font-size: 11px; color: #555;">
                <strong>STUDENT PORTFOLIO PROJECT</strong><br>
                This is a non-commercial coding exercise by <strong>Akshat Mehta</strong>.<br>
                <a href="https://github.com/AkshatMehta-124" target="_blank" style="color: #128C7E; text-decoration: none; font-weight: 600;">View Source on GitHub</a>
            </div>

            <img src="logo.png" alt="ChatApp Logo" class="login-logo">
            <h1>ChatApp Demo</h1>
            <p style="margin-bottom: 20px;">Firebase Integration Test</p>

            <div class="input-group">
                <input type="email" id="email-input" placeholder="Email Address">
                <input type="password" id="password-input" placeholder="Password">
                <button id="email-auth-btn" class="auth-btn">Sign In</button>
            </div>

            <p class="toggle-text" id="toggle-mode-text">New here? <span>Create an account</span></p>
            <div class="divider">OR</div>

            <button id="google-login-btn" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="20"> 
                Continue with Google
            </button>

            <p id="auth-error" style="display:none; color: red; background: #fee; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 13px;"></p>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="my-profile-info">
                    <img id="my-profile-pic" src="" alt="Me">
                    <span id="my-name">Name</span>
                </div>
                <div class="header-buttons">
                    <button id="edit-profile-btn">Edit</button>
                    <button id="logout-btn">Logout</button>
                </div>
            </div>
            <div class="user-list-container">
                <ul id="user-list"></ul>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <span id="chat-with-name">Select a contact to start chatting</span>
                <img src="logo.png" alt="App Logo" class="header-logo">
            </div>
            <div class="messages-container" id="messages"></div>
            <div class="chat-input-area" id="input-area" style="display: none;">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Edit Profile</h2>
            <label>Display Name:</label>
            <input type="text" id="edit-name-input" maxlength="30">
            <label>Profile Picture URL:</label>
            <input type="url" id="edit-pic-input" placeholder="https://link.com/pic.jpg">
            <div class="modal-buttons">
                <button id="delete-account-btn" style="background: #d32f2f; color: white; margin-right: auto; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Delete Account</button>
                <button id="close-modal-btn">Cancel</button>
                <button id="save-profile-btn">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, onSnapshot, addDoc, Timestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_lmaWDdayWIOKK02h2uvZSeBasdUonXc",
            authDomain: "chat-with-anyone-73526.firebaseapp.com",
            projectId: "chat-with-anyone-73526",
            storageBucket: "chat-with-anyone-73526.firebasestorage.app",
            messagingSenderId: "440915092993",
            appId: "1:440915092993:web:96e7af7a1a05156ae6c200",
            measurementId: "G-E856F2F0B0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentChatId = null;
        let unsubscribeMessages = null;
        let isSignUpMode = false; 

        const loginScreen = document.getElementById("login-screen");
        const appScreen = document.getElementById("app-screen");
        const userList = document.getElementById("user-list");
        const messagesContainer = document.getElementById("messages");
        const inputArea = document.getElementById("input-area");
        const messageInput = document.getElementById("message-input");
        const authError = document.getElementById("auth-error");

        function showError(msg) { 
            authError.textContent = msg; 
            authError.style.display = "block"; 
        }

        document.getElementById("google-login-btn").onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => showError(err.code));
        };

        document.getElementById("toggle-mode-text").onclick = () => {
            isSignUpMode = !isSignUpMode;
            authError.style.display = "none";
            document.getElementById("email-auth-btn").textContent = isSignUpMode ? "Create Account" : "Sign In";
            document.getElementById("toggle-mode-text").innerHTML = isSignUpMode ? 'Already have an account? <span>Sign In</span>' : 'New here? <span>Create an account</span>';
        };

        document.getElementById("email-auth-btn").onclick = async () => {
            const e = document.getElementById("email-input").value.trim();
            const p = document.getElementById("password-input").value.trim();
            if (!e || !p) return showError("Enter credentials.");
            try {
                if (isSignUpMode) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { showError(err.code); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginScreen.style.display = "none";
                appScreen.style.display = "flex";
                const n = user.displayName || user.email.split('@')[0];
                const pic = user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById("my-name").textContent = n;
                document.getElementById("my-profile-pic").src = pic;
                await setDoc(doc(db, "users", user.uid), { uid: user.uid, name: n, photoURL: pic }, { merge: true });
                loadUsers();
            } else {
                currentUser = null;
                loginScreen.style.display = "flex";
                appScreen.style.display = "none";
            }
        });

        function loadUsers() {
            onSnapshot(collection(db, "users"), (s) => {
                userList.innerHTML = "";
                s.forEach((d) => {
                    const u = d.data();
                    if (currentUser && u.uid !== currentUser.uid) {
                        const li = document.createElement("li");
                        li.innerHTML = `<img src="${u.photoURL}"> <span>${u.name}</span>`;
                        li.onclick = () => openChat(u);
                        userList.append(li);
                    }
                });
            });
        }

        async function openChat(other) {
            currentChatId = currentUser.uid < other.uid ? currentUser.uid + "_" + other.uid : other.uid + "_" + currentUser.uid;
            document.getElementById("chat-with-name").textContent = other.name;
            inputArea.style.display = "flex";
            if (unsubscribeMessages) unsubscribeMessages();
            await setDoc(doc(db, "chats", currentChatId), { participants: [currentUser.uid, other.uid] }, { merge: true });
            const q = query(collection(db, "chats", currentChatId, "messages"), orderBy("timestamp", "asc"));
            unsubscribeMessages = onSnapshot(q, (s) => {
                messagesContainer.innerHTML = "";
                s.forEach((d) => {
                    const m = d.data({ serverTimestamps: "estimate" });
                    const div = document.createElement("div");
                    div.className = m.senderId === currentUser.uid ? "message my-message" : "message their-message";
                    const txt = document.createElement("span"); txt.textContent = m.text;
                    div.append(txt);
                    messagesContainer.append(div);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        document.getElementById("send-btn").onclick = async () => {
            const t = messageInput.value.trim();
            if (t) {
                messageInput.value = "";
                await addDoc(collection(db, "chats", currentChatId, "messages"), { text: t, senderId: currentUser.uid, timestamp: Timestamp.now() });
            }
        };

        document.getElementById("logout-btn").onclick = () => signOut(auth);
        document.getElementById("delete-account-btn").onclick = async () => {
            if (confirm("Delete Account?")) {
                await deleteDoc(doc(db, "users", currentUser.uid));
                await deleteUser(currentUser);
            }
        };
    </script>
</body>
</html>
