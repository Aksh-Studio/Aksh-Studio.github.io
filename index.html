<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="uxFFc2wW4266GeX3SJD-_9sGId4Mi6wer2hOxYW8SD0" />
    <title>Aksh Web Suite Gateway</title>
    <link rel="icon" type="image/png" href="aksh-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="google-adsense-account" content="ca-pub-1260837830892549">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1260837830892549" crossorigin="anonymous"></script>
    <style>
        .name-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .name-row input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        .personal-label { font-size: 13px; color: #128C7E; font-weight: 600; margin-top: 10px; margin-bottom: 5px; display: block; text-align: left; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="auth-box">
            <div class="portfolio-banner">
                <strong>STUDENT PORTFOLIO PROJECT</strong><br>
                This is an educational multi-app sandbox suite by <strong>Akshat Mehta</strong>.<br>
                <a href="https://github.com/AkshatMehta-124" target="_blank" class="source-link">View Repository Source</a>
            </div>
            
            <img src="aksh-logo.png" alt="Suite Logo" class="login-logo">
            <h1>Web Sandbox Suite</h1>

            <div id="login-section">
                <p class="subtitle" id="auth-subtitle">Sign in to access your utilities</p>
                <div class="input-group">
                    <input type="email" id="email-input" placeholder="Email Address">
                    <input type="password" id="password-input" placeholder="Password">
                    
                    <div id="signup-security-fields" style="display: none; margin-top: 10px;">
                        <label class="personal-label">Personal Details</label>
                        <div class="name-row">
                            <input type="text" id="signup-first-name" placeholder="First Name *" required>
                            <input type="text" id="signup-middle-name" placeholder="Middle Name">
                        </div>
                        <input type="text" id="signup-last-name" placeholder="Last Name" style="width: 100%; margin-bottom: 8px; box-sizing: border-box; padding: 10px;">
                        
                        <div class="name-row">
                            <input type="date" id="signup-dob" title="Date of Birth" required>
                            <select id="signup-gender" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px;">
                                <option value="" disabled selected>Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <input type="tel" id="signup-phone" placeholder="Phone Number (+91...)" style="width: 100%; margin-bottom: 8px; box-sizing: border-box; padding: 10px;" required>
                    </div>

                    <button id="email-auth-btn" class="auth-btn">Sign In</button>
                </div>
                <p class="toggle-text" id="toggle-mode-text">New here? <span>Create an account</span></p>
                <p class="toggle-text" id="link-forgot-password" style="margin-top: 5px;"><span>Forgot Password?</span></p>

                <div class="divider">OR</div>
                <button id="google-login-btn" class="google-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="18"> 
                    Continue with Google
                </button>
            </div>

            <div id="forgot-password-section" style="display: none;">
                <p class="subtitle">Secure Password Reset</p>
                <div class="input-group">
                    <input type="email" id="reset-email" placeholder="Enter your email">
                    <button id="btn-send-reset" class="auth-btn">Send Reset Link</button>
                </div>
                <p class="toggle-text" id="link-back-login"><span>Back to Login</span></p>
            </div>

            <p id="auth-error" class="error-msg" style="display:none;"></p>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
