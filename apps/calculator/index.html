<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aksh Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-nav">
        <a href="../../dashboard.html" class="back-btn">← Dashboard</a>
        <span class="app-title">Calculator</span>
    </div>

    <div class="calculator-grid">
        <div class="output">
            <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand">0</div>
        </div>
        
        <button data-all-clear class="btn-span-two operator-btn">AC</button>
        <button data-delete class="operator-btn">DEL</button>
        <button data-operation class="operator-btn">÷</button>
        
        <button data-number>7</button>
        <button data-number>8</button>
        <button data-number>9</button>
        <button data-operation class="operator-btn">×</button>
        
        <button data-number>4</button>
        <button data-number>5</button>
        <button data-number>6</button>
        <button data-operation class="operator-btn">−</button>
        
        <button data-number>1</button>
        <button data-number>2</button>
        <button data-number>3</button>
        <button data-operation class="operator-btn">+</button>
        
        <button data-number class="btn-span-two zero-btn">0</button>
        <button data-number>.</button>
        <button data-equals class="equals-btn">=</button>
    </div>

    <script src="calc.js"></script>
</body>
</html>
