<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator | Aksh Studio</title>
    <link rel="icon" type="image/png" href="../../calc-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
</head>
<body>
    <div style="width: 100%; max-width: 1000px;">
        <a href="../../dashboard.html" class="back-link">← Back to Dashboard</a>

        <div class="app-layout">
            <div class="calc-container">
                
                <div class="calc-display" id="main-display-container">
                    <div class="display-history" id="display-history"></div>
                    <div class="display-main" id="display-main">0</div>
                </div>

                <div class="calc-tabs" style="overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;">
                    <button class="tab-btn active" id="tab-scientific">Scientific</button>
                    <button class="tab-btn" id="tab-financial">Financial</button>
                    <button class="tab-btn" id="tab-graphing">Graphing</button>
                    <button class="tab-btn" id="tab-algebra">Algebra</button>
                    <button class="tab-btn" id="tab-trigonometry">Trigonometry</button>
                    <button class="tab-btn" id="tab-calculus">Calculus</button>
                    <button class="tab-btn" id="tab-currency">Currency</button>
                    <button class="tab-btn" id="tab-unit">Unit</button>
                    <button class="tab-btn" id="tab-age">Age</button>
                    <button class="tab-btn" id="tab-bmi">BMI</button>
                    <button class="tab-btn" id="tab-discount">Discount</button>
                    <button class="tab-btn" id="tab-data">Data</button>
                </div>

                <div id="module-scientific" class="calc-grid scientific">
                    <button class="calc-btn func" data-val="sin">sin</button>
                    <button class="calc-btn func" data-val="cos">cos</button>
                    <button class="calc-btn func" data-val="tan">tan</button>
                    <button class="calc-btn func" data-val="log">log</button>
                    <button class="calc-btn clear" id="btn-clear">C</button>
                    
                    <button class="calc-btn func" data-val="pi">π</button>
                    <button class="calc-btn num" data-val="7">7</button>
                    <button class="calc-btn num" data-val="8">8</button>
                    <button class="calc-btn num" data-val="9">9</button>
                    <button class="calc-btn operator" data-val="/">÷</button>
                    
                    <button class="calc-btn func" data-val="e">e</button>
                    <button class="calc-btn num" data-val="4">4</button>
                    <button class="calc-btn num" data-val="5">5</button>
                    <button class="calc-btn num" data-val="6">6</button>
                    <button class="calc-btn operator" data-val="*">×</button>
                    
                    <button class="calc-btn func" data-val="x2">x²</button>
                    <button class="calc-btn num" data-val="1">1</button>
                    <button class="calc-btn num" data-val="2">2</button>
                    <button class="calc-btn num" data-val="3">3</button>
                    <button class="calc-btn operator" data-val="-">−</button>
                    
                    <button class="calc-btn func" data-val="sqrt">√</button>
                    <button class="calc-btn num" data-val="0">0</button>
                    <button class="calc-btn num" data-val=".">.</button>
                    <button class="calc-btn equals" id="btn-equals">=</button>
                    <button class="calc-btn operator" data-val="+">+</button>
                </div>

                <div id="module-financial" class="module-form" style="display: none;">
                    <label>Calculation Type</label>
                    <select id="fin-type"><option value="compound">Compound Interest</option><option value="emi">Loan EMI</option></select>
                    <label>Principal Amount (₹)</label><input type="number" id="fin-principal" placeholder="100000">
                    <label>Interest Rate (%)</label><input type="number" id="fin-rate" placeholder="7.5">
                    <label>Time (Years)</label><input type="number" id="fin-time" placeholder="5">
                    <button id="fin-calc-btn">Calculate</button>
                    <div id="fin-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-graphing" class="module-form" style="display: none;">
                    <label>Equation y = f(x)</label><input type="text" id="graph-equation" placeholder="e.g. Math.sin(x)">
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;"><label>X Min</label><input type="number" id="g-xmin" value="-10"></div>
                        <div style="flex: 1;"><label>X Max</label><input type="number" id="g-xmax" value="10"></div>
                    </div>
                    <button id="plot-btn">Plot Graph</button>
                    <canvas id="graph-canvas" width="400" height="300"></canvas>
                </div>

                <div id="module-algebra" class="module-form" style="display: none;">
                    <h4 style="color: var(--primary-color); margin-bottom: 0;">Linear Equation Solver</h4>
                    <label>Equation (use 'x' as variable)</label>
                    <input type="text" id="alg-eq" placeholder="e.g. 2*x + 5 = 15">
                    <button id="alg-solve-btn">Solve for x</button>
                    <div id="alg-eq-result" style="margin-top: 10px; font-weight: bold; color: var(--primary-color); text-align: center;"></div>
                    
                    <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                    
                    <h4 style="color: var(--primary-color); margin-bottom: 0;">Quadratic Equation (ax² + bx + c = 0)</h4>
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;"><label>a</label><input type="number" id="alg-a" placeholder="a"></div>
                        <div style="flex: 1;"><label>b</label><input type="number" id="alg-b" placeholder="b"></div>
                        <div style="flex: 1;"><label>c</label><input type="number" id="alg-c" placeholder="c"></div>
                    </div>
                    <button id="alg-quad-btn">Calculate Roots</button>
                    <div id="alg-quad-result" style="margin-top: 10px; font-weight: bold; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-trigonometry" class="module-form" style="display: none;">
                    <label>Angle Value</label>
                    <input type="number" id="trig-angle" placeholder="e.g. 45">
                    <label>Unit</label>
                    <select id="trig-unit"><option value="deg">Degrees</option><option value="rad">Radians</option></select>
                    <button id="trig-calc-btn">Calculate All Functions</button>
                    <div id="trig-result" style="margin-top: 15px; font-size: 15px; color: var(--text-main); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px;"></div>
                </div>

                <div id="module-calculus" class="module-form" style="display: none;">
                    <h4 style="color: var(--primary-color); margin-bottom: 0;">Derivatives</h4>
                    <label>Function f(x)</label>
                    <input type="text" id="calc-deriv-func" placeholder="e.g. x^2 + 2*x">
                    <button id="calc-deriv-btn">Calculate Derivative</button>
                    <div id="calc-deriv-result" style="margin-top: 10px; font-weight: bold; font-size: 20px; color: var(--primary-color); text-align: center; word-break: break-all;"></div>
                    
                    <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                    
                    <h4 style="color: var(--primary-color); margin-bottom: 0;">Definite Integrals</h4>
                    <label>Function f(x)</label>
                    <input type="text" id="calc-int-func" placeholder="e.g. x^2">
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;"><label>Lower Limit (a)</label><input type="number" id="calc-int-a" value="0"></div>
                        <div style="flex: 1;"><label>Upper Limit (b)</label><input type="number" id="calc-int-b" value="1"></div>
                    </div>
                    <button id="calc-int-btn">Calculate Integral</button>
                    <div id="calc-int-result" style="margin-top: 10px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-currency" class="module-form" style="display: none;">
                    <label>Amount</label><input type="number" id="curr-amount" value="1">
                    <label>From Currency</label>
                    <select id="curr-from"><option value="USD">USD - US Dollar</option><option value="INR" selected>INR - Indian Rupee</option><option value="EUR">EUR - Euro</option><option value="GBP">GBP - British Pound</option><option value="JPY">JPY - Japanese Yen</option><option value="AUD">AUD - Australian Dollar</option></select>
                    <label>To Currency</label>
                    <select id="curr-to"><option value="USD" selected>USD - US Dollar</option><option value="INR">INR - Indian Rupee</option><option value="EUR">EUR - Euro</option><option value="GBP">GBP - British Pound</option><option value="JPY">JPY - Japanese Yen</option><option value="AUD">AUD - Australian Dollar</option></select>
                    <button id="curr-calc-btn">Convert Currency</button>
                    <div id="curr-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-unit" class="module-form" style="display: none;">
                    <label>Category</label>
                    <select id="unit-category"><option value="length">Length (Meters ↔ Feet)</option><option value="weight">Weight (Kg ↔ Lbs)</option><option value="temp">Temperature (°C ↔ °F)</option></select>
                    <label>Value</label><input type="number" id="unit-val" value="1">
                    <button id="unit-calc-btn">Convert</button>
                    <div id="unit-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-age" class="module-form" style="display: none;">
                    <label>Date of Birth</label><input type="date" id="age-dob">
                    <label>Calculate Age At</label><input type="date" id="age-target">
                    <button id="age-calc-btn">Calculate Age</button>
                    <div id="age-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-bmi" class="module-form" style="display: none;">
                    <label>Height (in Centimeters)</label><input type="number" id="bmi-height" placeholder="e.g. 175">
                    <label>Weight (in Kilograms)</label><input type="number" id="bmi-weight" placeholder="e.g. 70">
                    <button id="bmi-calc-btn">Calculate BMI</button>
                    <div id="bmi-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-discount" class="module-form" style="display: none;">
                    <label>Original Price</label><input type="number" id="disc-price" placeholder="e.g. 1000">
                    <label>Discount Percentage (%)</label><input type="number" id="disc-percent" placeholder="e.g. 20">
                    <button id="disc-calc-btn">Calculate Final Price</button>
                    <div id="disc-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-data" class="module-form" style="display: none;">
                    <label>Data Amount</label><input type="number" id="data-val" value="1">
                    <label>From</label><select id="data-from"><option value="KB">Kilobytes (KB)</option><option value="MB" selected>Megabytes (MB)</option><option value="GB">Gigabytes (GB)</option><option value="TB">Terabytes (TB)</option></select>
                    <label>To</label><select id="data-to"><option value="KB">Kilobytes (KB)</option><option value="MB">Megabytes (MB)</option><option value="GB" selected>Gigabytes (GB)</option><option value="TB">Terabytes (TB)</option></select>
                    <button id="data-calc-btn">Convert Data</button>
                    <div id="data-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

            </div>

            <div class="history-sidebar" id="history-panel">
                <div class="history-header">
                    <h3>Cloud History</h3>
                    <button class="btn-clear-history" id="btn-clear-history">Clear</button>
                </div>
                <ul class="history-list" id="history-list">
                    <li style="color: #888; text-align: center; font-size: 13px;">Loading history...</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module" src="calc.js"></script>
</body>
</html>
