<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator | Aksh Studio</title>
    <link rel="icon" type="image/png" href="../../calc-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="width: 100%; max-width: 1000px;">
        <a href="../../dashboard.html" class="back-link">← Back to Dashboard</a>

        <div class="app-layout">
            <div class="calc-container">
                
                <div class="calc-display">
                    <div class="display-history" id="display-history"></div>
                    <div class="display-main" id="display-main">0</div>
                </div>

                <div class="calc-tabs">
                    <button class="tab-btn active" id="tab-scientific">Scientific</button>
                    <button class="tab-btn" id="tab-financial">Financial</button>
                    <button class="tab-btn" id="tab-graphing">Graphing</button>
                </div>

                <div id="module-scientific" class="calc-grid scientific">
                    <button class="calc-btn func" data-val="sin">sin</button>
                    <button class="calc-btn func" data-val="cos">cos</button>
                    <button class="calc-btn func" data-val="tan">tan</button>
                    <button class="calc-btn func" data-val="log">log</button>
                    <button class="calc-btn clear" id="btn-clear">C</button>
                    
                    <button class="calc-btn func" data-val="pi">π</button>
                    <button class="calc-btn num" data-val="7">7</button>
                    <button class="calc-btn num" data-val="8">8</button>
                    <button class="calc-btn num" data-val="9">9</button>
                    <button class="calc-btn operator" data-val="/">÷</button>
                    
                    <button class="calc-btn func" data-val="e">e</button>
                    <button class="calc-btn num" data-val="4">4</button>
                    <button class="calc-btn num" data-val="5">5</button>
                    <button class="calc-btn num" data-val="6">6</button>
                    <button class="calc-btn operator" data-val="*">×</button>
                    
                    <button class="calc-btn func" data-val="x2">x²</button>
                    <button class="calc-btn num" data-val="1">1</button>
                    <button class="calc-btn num" data-val="2">2</button>
                    <button class="calc-btn num" data-val="3">3</button>
                    <button class="calc-btn operator" data-val="-">−</button>
                    
                    <button class="calc-btn func" data-val="sqrt">√</button>
                    <button class="calc-btn num" data-val="0">0</button>
                    <button class="calc-btn num" data-val=".">.</button>
                    <button class="calc-btn equals" id="btn-equals">=</button>
                    <button class="calc-btn operator" data-val="+">+</button>
                </div>

                <div id="module-financial" class="module-form" style="display: none;">
                    <label>Calculation Type</label>
                    <select id="fin-type">
                        <option value="compound">Compound Interest</option>
                        <option value="emi">Loan EMI</option>
                    </select>
                    
                    <label>Principal Amount (₹)</label>
                    <input type="number" id="fin-principal" placeholder="e.g. 100000">
                    
                    <label>Interest Rate (%)</label>
                    <input type="number" id="fin-rate" placeholder="e.g. 7.5">
                    
                    <label>Time (Years)</label>
                    <input type="number" id="fin-time" placeholder="e.g. 5">
                    
                    <button id="fin-calc-btn">Calculate</button>
                    
                    <div id="fin-result" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: var(--primary-color); text-align: center;"></div>
                </div>

                <div id="module-graphing" class="module-form" style="display: none;">
                    <label>Equation y = f(x)</label>
                    <input type="text" id="graph-equation" placeholder="e.g. Math.sin(x) or x*x">
                    
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label>X Min</label>
                            <input type="number" id="g-xmin" value="-10">
                        </div>
                        <div style="flex: 1;">
                            <label>X Max</label>
                            <input type="number" id="g-xmax" value="10">
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label>Y Min</label>
                            <input type="number" id="g-ymin" value="-10">
                        </div>
                        <div style="flex: 1;">
                            <label>Y Max</label>
                            <input type="number" id="g-ymax" value="10">
                        </div>
                    </div>

                    <button id="plot-btn">Plot Graph</button>
                    
                    <canvas id="graph-canvas" width="400" height="300"></canvas>
                </div>

            </div>

            <div class="history-sidebar" id="history-panel">
                <div class="history-header">
                    <h3>Cloud History</h3>
                    <button class="btn-clear-history" id="btn-clear-history">Clear</button>
                </div>
                <ul class="history-list" id="history-list">
                    <li style="color: #888; text-align: center; font-size: 13px;">Loading history...</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module" src="calc.js"></script>
</body>
</html>
