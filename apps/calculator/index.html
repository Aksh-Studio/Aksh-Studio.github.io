<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator | Aksh Studio</title>
    <link rel="icon" type="image/png" href="../../calc-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-nav">
        <a href="../../dashboard.html" class="back-btn">← Dashboard</a>
        <div class="mode-tabs">
            <button class="tab active" data-target="scientific">Scientific</button>
            <button class="tab" data-target="graphing">Graphing</button>
            <button class="tab" data-target="financial">Financial</button>
        </div>
        <div class="app-brand">
            <img src="../../calc-logo.png" alt="Calculator" class="nav-logo" onerror="this.style.display='none'">
            <button id="history-toggle" class="history-btn">🕒 History</button>
        </div>
    </div>

    <div id="history-panel" class="history-panel hidden">
        <h3>Calculation History</h3>
        <div id="history-list"></div>
        <button id="clear-history" class="history-clear-btn">Clear History</button>
    </div>

    <div class="calculator-container">
        
        <div id="scientific" class="app-module active-module">
            <div class="calculator-grid">
                <div class="output">
                    <div data-previous-operand class="previous-operand"></div>
                    <div data-current-operand class="current-operand">0</div>
                </div>
                
                <button data-single-op="sin" class="sci-btn">sin</button>
                <button data-single-op="cos" class="sci-btn">cos</button>
                <button data-single-op="tan" class="sci-btn">tan</button>
                <button data-constant="pi" class="sci-btn">π</button>
                <button data-constant="e" class="sci-btn">e</button>

                <button data-single-op="sqrt" class="sci-btn">√</button>
                <button data-single-op="log" class="sci-btn">log</button>
                <button data-all-clear class="operator-btn ac-btn">AC</button>
                <button data-delete class="operator-btn">DEL</button>
                <button data-operation="÷" class="operator-btn">÷</button>
                
                <button data-single-op="square" class="sci-btn">x²</button>
                <button data-number>7</button>
                <button data-number>8</button>
                <button data-number>9</button>
                <button data-operation="×" class="operator-btn">×</button>
                
                <button data-single-op="ln" class="sci-btn">ln</button>
                <button data-number>4</button>
                <button data-number>5</button>
                <button data-number>6</button>
                <button data-operation="−" class="operator-btn">−</button>
                
                <button data-single-op="1/x" class="sci-btn">1/x</button>
                <button data-number>1</button>
                <button data-number>2</button>
                <button data-number>3</button>
                <button data-operation="+" class="operator-btn">+</button>
                
                <button data-single-op="abs" class="sci-btn">|x|</button>
                <button data-number class="zero-btn">0</button>
                <button data-number>.</button>
                <button data-equals class="equals-btn span-two">=</button>
            </div>
        </div>

        <div id="financial" class="app-module">
            <div class="fin-card">
                <h2>Advanced Time Value of Money</h2>
                <div class="input-group">
                    <label>Initial Principal ($)</label>
                    <input type="number" id="fin-principal" placeholder="e.g., 10000">
                </div>
                <div class="input-group">
                    <label>Monthly Contribution ($) <small>Optional</small></label>
                    <input type="number" id="fin-pmt" placeholder="e.g., 200" value="0">
                </div>
                <div class="input-group">
                    <label>Annual Interest Rate (%)</label>
                    <input type="number" id="fin-rate" placeholder="e.g., 5">
                </div>
                <div class="input-group">
                    <label>Time (Years)</label>
                    <input type="number" id="fin-years" placeholder="e.g., 10">
                </div>
                <div class="input-group">
                    <label>Compounding Frequency</label>
                    <select id="fin-compound" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
                        <option value="12">Monthly</option>
                        <option value="1">Annually</option>
                        <option value="4">Quarterly</option>
                        <option value="365">Daily</option>
                    </select>
                </div>
                <button id="calc-fin-btn" class="fin-btn">Calculate Investment</button>
                
                <div class="fin-result">
                    <p>Total Future Value: <span id="fin-fv">$0.00</span></p>
                    <p>Total Interest Earned: <span id="fin-interest">$0.00</span></p>
                </div>
            </div>
        </div>

        <div id="graphing" class="app-module">
            <div class="graph-card">
                <h2>Equation Plotter</h2>
                <div class="graph-controls">
                    <label>y = </label>
                    <input type="text" id="graph-equation" placeholder="Math.sin(x)" value="Math.sin(x)">
                    <button id="plot-btn" class="fin-btn" style="width: auto;">Plot</button>
                    <button id="zoom-in" class="fin-btn" style="width: auto; background:#444;">Zoom +</button>
                    <button id="zoom-out" class="fin-btn" style="width: auto; background:#444;">Zoom -</button>
                </div>
                <canvas id="graphCanvas" width="600" height="400"></canvas>
            </div>
        </div>

    </div>

    <script type="module" src="calc.js"></script>
</body>
</html>
