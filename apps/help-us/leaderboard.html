<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Aksh Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="back-link">
                <span class="material-symbols-rounded">arrow_back</span>
                Back to Support Hub
            </a>
            <div class="brand">
                <h1 class="brand-title">Top Supporters</h1>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="hub-header">
            <span class="material-symbols-rounded" style="font-size: 48px; color: #f59e0b; margin-bottom: 10px;">military_tech</span>
            <h2>Studio Leaderboard</h2>
            <p>Recognizing the top contributors who help keep Aksh Studio running for free.</p>
        </header>

        <div class="hub-card" style="max-width: 600px; margin: 0 auto;">
            <ul id="leaderboard-list" style="list-style: none; padding: 0;">
                <li style="text-align: center; color: var(--text-muted); padding: 20px;">Fetching top supporters...</li>
            </ul>
        </div>
    </main>

    <script type="module" src="leaderboard.js"></script>
</body>
</html>
